<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategy 2 Screener</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f0f0f;
        color: #e8e6e1;
        min-height: 100vh;
        padding: 24px 16px;
      }
      #root { max-width: 1100px; margin: 0 auto; }

      /* Design tokens matching Claude artifact variables */
      :root {
        --color-background-primary:   #0f0f0f;
        --color-background-secondary: #1a1a1a;
        --color-background-success:   #0d2b1a;
        --color-background-danger:    #2b0d0d;
        --color-background-warning:   #2b1f0d;
        --color-background-info:      #0d1a2b;
        --color-text-primary:         #e8e6e1;
        --color-text-secondary:       #888780;
        --color-text-success:         #4caf82;
        --color-text-danger:          #e05c5c;
        --color-text-warning:         #e0a84a;
        --color-text-info:            #4a90e0;
        --color-border-tertiary:      #2a2a2a;
        --border-radius-md:           6px;
        --border-radius-lg:           10px;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      input[type="range"] {
        accent-color: #4a90e0;
        width: 100%;
      }
      textarea, input {
        outline: none;
      }
      textarea:focus, input:focus {
        border-color: #4a90e0 !important;
      }
      table { border-collapse: collapse; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
