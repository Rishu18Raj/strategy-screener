<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fundamental Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:            #080c14;
        --bg-card:       #0d1117;
        --bg-hover:      #111827;
        --border:        #1e2535;
        --border-subtle: #161d2d;
        --text-primary:  #e8eaf0;
        --text-secondary:#5a6480;
        --text-muted:    #374162;
        --accent:        #3b82f6;
        --accent-dim:    #1d3461;
        --green:         #22c55e;
        --green-dim:     #052e16;
        --red:           #ef4444;
        --red-dim:       #2d0a0a;
        --amber:         #f59e0b;
        --amber-dim:     #2d1a00;

        --color-background-primary:   var(--bg);
        --color-background-secondary: var(--bg-card);
        --color-background-success:   var(--green-dim);
        --color-background-danger:    var(--red-dim);
        --color-background-warning:   var(--amber-dim);
        --color-background-info:      var(--accent-dim);
        --color-text-primary:         var(--text-primary);
        --color-text-secondary:       var(--text-secondary);
        --color-text-success:         var(--green);
        --color-text-danger:          var(--red);
        --color-text-warning:         var(--amber);
        --color-text-info:            var(--accent);
        --color-border-tertiary:      var(--border);
        --border-radius-md:           5px;
        --border-radius-lg:           8px;
        --font-sans:                  'Inter', sans-serif;
        --font-mono:                  'JetBrains Mono', monospace;

        --sidebar-w: 210px;
        font-size: 16px; /* base bump — all rem/em scales from here */
      }

      html, body { height: 100%; overflow: hidden; }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
      }

      #root { height: 100%; display: flex; flex-direction: column; }

      input[type="range"] { accent-color: var(--accent); width: 100%; }
      textarea, input { outline: none; }
      textarea:focus, input:focus { border-color: var(--accent) !important; }
      code {
        font-family: var(--font-mono);
        background: var(--bg-hover);
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 0.88em;
      }
      * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
